# Database (persistente em disco para manter contas entre reinicios locais)
spring.datasource.url=jdbc:h2:file:./data/lusolawdb;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable H2 console in default profile
spring.h2.console.enabled=false

# Upload limits
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=20MB

# Seed data (disabled by default)
app.seed.enabled=${APP_SEED_ENABLED:false}

# Admin bootstrap (configure in production)
app.admin.bootstrap.enabled=${APP_ADMIN_BOOTSTRAP_ENABLED:true}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.name=${APP_ADMIN_NAME:Platform Admin}

# Stripe key (inject via env var in production)
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# JWT (must be set in production and must be at least 32 bytes long)
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-minutes=${APP_JWT_EXP_MINUTES:120}
app.jwt.issuer=${APP_JWT_ISSUER:lusolaw}

# Anti brute-force / abuse
app.security.rate-limit.login.max-attempts=${APP_RATE_LOGIN_MAX:10}
app.security.rate-limit.login.window-minutes=${APP_RATE_LOGIN_WINDOW_MIN:15}
app.security.rate-limit.register.max-attempts=${APP_RATE_REGISTER_MAX:12}
app.security.rate-limit.register.window-minutes=${APP_RATE_REGISTER_WINDOW_MIN:60}

# Error handling hygiene
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
